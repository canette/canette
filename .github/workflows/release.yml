name: Release

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Check ref is not main
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${REF_NAME}" = "main" ]; then
            echo "Error: release workflow must be run from a tag, not main" >&2
            exit 1
          fi

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform images
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}
          TAG: ${{ steps.version.outputs.version }}-${{ matrix.suffix }}
          PLATFORMS: ${{ matrix.platform }}
        run: ./scripts/build-images.sh --push

  merge:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          REPO: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for image in canette-api canette-ui canette-builder canette-controller \
                       canette-builder-git-init canette-builder-image-build canette-logstreamer; do
            docker buildx imagetools create \
              -t ${REPO}/${image}:${VERSION} \
              -t ${REPO}/${image}:latest \
              ${REPO}/${image}:${VERSION}-amd64 \
              ${REPO}/${image}:${VERSION}-arm64
          done

  helm:
    needs: [build, merge]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Stamp Chart.yaml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/canette/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/canette/Chart.yaml

      - name: Package chart
        run: helm package charts/canette

      - name: Push chart
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: helm push canette-*.tgz oci://ghcr.io/${REPO_OWNER}
