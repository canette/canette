name: Release

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check ref is not main
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "Error: release workflow must be run from a tag, not main" >&2
            exit 1
          fi

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}
          TAG: ${{ steps.version.outputs.version }}
        run: ./scripts/build-images.sh --push --latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Stamp Chart.yaml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/canette/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/canette/Chart.yaml

      - name: Package chart
        run: helm package charts/canette

      - name: Push chart
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: helm push canette-*.tgz oci://ghcr.io/${REPO_OWNER}
