name: Build Edge Images

on:
  push:
    branches:
      - main
    paths:
      - apps/builder/**
      - apps/controller/**
      - apps/logstreamer/**
      - apps/ui/**
      - apps/api/**
      - packages/**
      - package.json
      - scripts/build-images.sh
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform images
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}
          TAG: edge-${{ matrix.suffix }}
          PLATFORMS: ${{ matrix.platform }}
        run: ./scripts/build-images.sh --push

  merge:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          REPO: ghcr.io/${{ github.repository_owner }}
        run: |
          for image in canette-api canette-ui canette-builder canette-controller \
                       canette-builder-git-init canette-builder-image-build canette-logstreamer; do
            docker buildx imagetools create \
              -t ${REPO}/${image}:edge \
              ${REPO}/${image}:edge-amd64 \
              ${REPO}/${image}:edge-arm64
          done
