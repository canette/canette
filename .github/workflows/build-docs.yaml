name: Build Docs

on:
  pull_request:
    branches:
      - '*'
    paths:
      - apps/docs
      - package.json
  push:
    branches:
      - main
    paths:
      - apps/docs
      - package.json
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.11

    - name: Bun install
      run: bun install --frozen-lockfile

    - name: Build Docs
      run: bun run build:docs

# We should have tests
#    - name: Test Docs
#      run: bun run test:docs
