# canette Helm chart values

# ---------------------------------------------------------------------------
# Global image settings
# ---------------------------------------------------------------------------
# Base repository for all canette service images.
# Each service image defaults to {image.repo}/{serviceName}:{image.tag}.
# Override individual images under each service section if needed.
image:
  repo: "ghcr.io/canette"
  # Overrides the image tag for all service images.
  # Leave empty to use Chart.AppVersion (recommended — tag and chart version stay in sync).
  tag: ""

# Required: base domain for all dynamic hostnames.
# App URLs are constructed as {app}-{project}.<domain>.
# The in-cluster registry (when enabled) is exposed at registry.<domain>.
domain: ""

# AES-256-GCM encryption key shared by builder and controller.
# Used to encrypt/decrypt git credentials and app secrets at rest.
# Leave empty to auto-generate on first install (recommended).
# The generated key is stored in the canette-encryption-key Secret and reused
# on every subsequent upgrade. Set explicitly only if you need to restore a
# known key (e.g. disaster recovery or cluster migration).
encryptionKey: ""

# ---------------------------------------------------------------------------
# PostgreSQL (optional — set enabled: false to use an external database)
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image: postgres:18.3-alpine3.23
  # Override auto-generated postgres password.
  # By default canette generates a random password on first install and stores it in
  # the postgres-credentials Secret, reusing it on every upgrade.
  # Set this to use your own password instead (e.g. for disaster recovery).
  password: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    # Enable a PersistentVolumeClaim for postgres data.
    # Set to false when using ephemeral clusters (e.g. quick EKS tests) where
    # provisioning a PV is not worth the effort — data will be lost on pod restart.
    enabled: true
    size: 5Gi
    # storageClass: "" # Leave empty to use the cluster default StorageClass.

# Used when postgres.enabled=false
externalDatabase:
  url: ""
  # Optional: inject the database password from a Kubernetes Secret at runtime.
  # Set passwordSecretRef.name and put $(DB_PASSWORD) in the url where the password goes.
  # Example url: "postgresql://myuser:$(DB_PASSWORD)@myhost:5432/mydb?sslmode=require"
  passwordSecretRef:
    name: ""
    key: "password"
  # SSL settings for external databases (e.g. AWS RDS, Cloud SQL).
  # Provide caCert (inline PEM) or caCertSecretRef (existing K8s Secret) to
  # verify the server's TLS certificate.
  ssl:
    caCert: ""
    caCertSecretRef:
      name: ""
      key: "ca.crt"
    # Set to false to skip certificate verification.
    # WARNING: disables MITM protection — only for dev/testing.
    rejectUnauthorized: true

# ---------------------------------------------------------------------------
# External registry credentials (used when registry.enabled=false)
# ---------------------------------------------------------------------------
externalRegistry:
  # Push credentials — used by the builder to push images after a build.
  username: ""
  password: ""
  # Optional: read the push password from a Kubernetes Secret instead of a plain value.
  # The secret must exist in the system namespace before helm install/upgrade.
  passwordSecretRef:
    name: ""
    key: "password"
  # Pull credentials — used by the kubelet to pull images onto app nodes.
  # Configure a separate read-only registry account here to limit blast radius if the
  # imagePullSecret is ever read from an app namespace (see imagePullSecrets below).
  # When not set, falls back to the push credentials above.
  pullUsername: ""
  pullPassword: ""
  # Optional: read the pull password from a Kubernetes Secret instead of a plain value.
  pullPasswordSecretRef:
    name: ""
    key: "password"

# ---------------------------------------------------------------------------
# In-cluster image registry (optional)
# ---------------------------------------------------------------------------
registry:
  enabled: true
  image: registry:2.8.3
  # Override auto-generated registry credentials.
  # By default canette generates a random username/password on first install and stores
  # them in the canette-registry-credentials Secret, reusing them on every upgrade.
  # Set both fields to use your own credentials instead (e.g. for disaster recovery).
  username: ""
  password: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # Storage backend configuration
  storage:
    # Storage type: "filesystem" (PVC) or "s3" (S3-compatible object storage)
    type: filesystem

    # S3 configuration (only used when type: s3)
    s3:
      # S3 bucket name (must exist before installation)
      bucket: ""
      # S3 region (e.g., "us-east-1")
      region: ""
      # S3 endpoint (optional, for S3-compatible services)
      # Leave empty for AWS S3, set for MinIO/DigitalOcean Spaces/Backblaze B2
      # Examples:
      #   MinIO: "https://minio.example.com"
      #   DigitalOcean Spaces: "https://nyc3.digitaloceanspaces.com"
      #   Backblaze B2: "https://s3.us-west-001.backblazeb2.com"
      #   Wasabi: "https://s3.us-east-1.wasabisys.com"
      #   Cloudflare R2: "https://<account-id>.r2.cloudflarestorage.com"
      endpoint: ""
      # Enable path-style access (required for MinIO, optional for others)
      pathStyle: false
      # S3 credentials (static access key)
      accessKey: ""
      secretKey: ""
      # Optional: read credentials from an existing Kubernetes Secret
      # (takes precedence over accessKey/secretKey values above)
      secretRef:
        name: ""
        accessKeyKey: "access-key"
        secretKeyKey: "secret-key"
      # Enable encryption at rest (AWS S3 only)
      encrypt: false
      # Enable secure transport (HTTPS)
      secure: true
      # Root directory within the bucket (optional, defaults to "/")
      rootDirectory: "/"

  persistence:
    # PVC configuration (only used when storage.type: filesystem)
    # Enable a PersistentVolumeClaim for registry image storage.
    # Set to false when using ephemeral clusters (e.g. quick EKS tests) where
    # provisioning a PV is not worth the effort — images will be lost on pod restart.
    enabled: true
    size: 20Gi
    # storageClass: "" # Leave empty to use the cluster default StorageClass.

# ---------------------------------------------------------------------------
# BuildKit daemon (always deployed — required by the builder)
# ---------------------------------------------------------------------------
buildkit:
  # Run buildkitd in rootless mode (default). Requires user namespace support on the
  # node — see docs/self-hosting/requirements for per-distro instructions.
  # Set to false on nodes that do not support user namespaces (e.g. EKS Bottlerocket,
  # clusters with a restricted kernel). Rooted mode runs buildkitd with privileged: true
  # instead, which is less secure but works on any node.
  rootless: true
  # Override the buildkitd image. When empty, auto-derives to moby/buildkit:v0.21.0-rootless
  # when rootless=true, or moby/buildkit:v0.21.0 when rootless=false.
  image: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "4"
      memory: 4Gi
  # Additional registry trust entries written into buildkitd.toml.
  # The in-cluster registry is added automatically when registry.enabled=true.
  # Format: "<host:port>": { http: true, insecure: true }
  registries: {}
  # Restrict buildkit egress to internet-only by blocking RFC-1918 ranges.
  # This prevents a compromised build from reaching cluster-internal services
  # while still allowing package fetches from npm, PyPI, Docker Hub, etc.
  # Set to false if builds need to reach private package mirrors or registries
  # in RFC-1918 address space (e.g. an internal Artifactory or Nexus instance).
  restrictEgress: true

# ---------------------------------------------------------------------------
# Builder service
# ---------------------------------------------------------------------------
builder:
  # Override image (defaults to {image.repo}/builder:{image.tag})
  image: ""
  # Override railpack+buildctl+canette-config image used for build jobs
  # (defaults to {image.repo}/canette-builder-image-build:{image.tag})
  builderImage: ""
  # Override git-init image used as the init container in each build job
  # (defaults to {image.repo}/canette-builder-git-init:{image.tag})
  gitInitImage: ""
  # Registry URL the builder pushes images to (used inside the cluster).
  # Auto-derived as registry.canette-system.svc.cluster.local:5000/ when
  # registry.enabled=true. Override when using an external registry.
  # For ECR: set to "123456.dkr.ecr.us-east-1.amazonaws.com/canette/"
  imageRepo: ""
  # Registry authentication type: "irsa" (IRSA/workload identity) or "static" (username/password).
  # Auto-detects if empty: "irsa" for ECR URLs, "static" for others.
  registryAuthType: ""
  # ServiceAccount annotations for IRSA (EKS) or workload identity (GKE).
  # Example for EKS: eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/canette-builder
  serviceAccount:
    annotations: {}
  # BuildKit daemon address. Auto-derived from the buildkit service when left empty.
  buildkitdAddr: ""
  # Trivy image used for vulnerability scanning jobs. Override to pin a specific version.
  trivyImage: "aquasec/trivy:0.51.0"
  pollInterval: 5s
  maxConcurrent: 3
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Controller service
# ---------------------------------------------------------------------------
controller:
  # Override image (defaults to {image.repo}/canette-controller:{image.tag})
  image: ""
  # Registry URL reachable by the kubelet for image pulls.
  # Leave empty when registry.enabled=true — auto-derives to registry.<domain>/.
  # Required when registry.enabled=false, e.g.: ghcr.io/myorg/
  pullRepo: ""
  gateway:
    name: can-gateway
    namespace: kube-system
  pollInterval: 5s
  logTailInterval: 10s
  maxConcurrent: 3
  # Enable automatic creation of imagePullSecrets in app namespaces.
  # When enabled, the controller creates a canette-registry-creds Secret in each app
  # namespace and adds imagePullSecrets to Deployment pod specs.
  #
  # Security notes:
  # - The Secret lives in the same namespace as the app. Any pod with Kubernetes API
  #   access and secret-read RBAC could read it. canette does not grant this by default,
  #   but misconfigured user workloads may.
  # - For the in-cluster registry, pull and push credentials are identical — a leaked
  #   secret therefore grants write access to the registry.
  # - For external registries, configure externalRegistry.pullUsername/pullPassword with
  #   a read-only registry account to limit the blast radius.
  #
  # Alternative: configure registry credentials directly in containerd on each node
  # (via /etc/containerd/certs.d/ or a node-level credential provider). When nodes
  # already have access, set enabled: false to skip Secret creation entirely.
  imagePullSecrets:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Security / scanning
# ---------------------------------------------------------------------------
security:
  scan:
    # Provider: "auto" | "trivy" | "ecr" | "none"
    # "auto" detects from IMAGE_REPO: ECR URLs → ecr, everything else → trivy.
    provider: "auto"
    # Enabled: "" (provider-aware default) | "true" | "false"
    # Must be a quoted string, not a YAML boolean — use "true" not true.
    # When empty: ECR provider is enabled by default (free), Trivy is disabled (slow, opt-in).
    enabled: ""
    # Block deployment when scan finds issues at or above this severity.
    # Only applies when mandatory: true.
    mandatory: false
    failSeverity: "HIGH"  # CRITICAL | HIGH | MEDIUM | LOW

# ---------------------------------------------------------------------------
# API service (Bun + Hono)
# ---------------------------------------------------------------------------
api:
  # Override image (defaults to {image.repo}/canette-api:{image.tag})
  image: ""
  # GitHub OAuth credentials (required for GitHub login)
  githubClientId: ""
  githubClientSecret: ""
  # Optional: read the GitHub client secret from a Kubernetes Secret instead of a plain value.
  # The secret must exist in the system namespace before helm install/upgrade.
  githubClientSecretRef:
    name: ""
    key: "github-client-secret"
  # Google OAuth credentials (optional — enables Google login)
  googleClientId: ""
  googleClientSecret: ""
  # Optional: read the Google client secret from a Kubernetes Secret instead of a plain value.
  # The secret must exist in the system namespace before helm install/upgrade.
  googleClientSecretRef:
    name: ""
    key: "google-client-secret"
  # GitHub App credentials (optional — enables "GitHub App" git credential type).
  # Create a GitHub App with Repository contents: Read and Webhooks: Read & Write,
  # install it on your GitHub org, then fill in the values below.
  # See docs/configuration/github-app for setup instructions.
  githubApp:
    appId: ""
    # installationId is only required for system credential mode (admin-configured single installation).
    # Leave empty if you want users to connect their own GitHub accounts via the per-team install wizard.
    installationId: ""
    # publicLink is the GitHub App's public URL, shown as "Public link" in the GitHub App settings.
    # Accepts either the full URL (https://github.com/apps/my-app) or just the slug (my-app).
    # Required for the per-team installation wizard.
    publicLink: ""
    # In your GitHub App settings, set the "Setup URL" (under Post installation) to:
    #   https://canette.company.com/api/v1/github-app/callback
    # This is not a Helm value — it is configured directly on the GitHub App.
    # Inline RSA private key PEM (escape newlines as \n).
    # Use privateKeySecretRef instead if you manage secrets externally.
    privateKey: ""
    privateKeySecretRef:
      name: ""
      key: "private-key"
  # BETTER_AUTH_SECRET is auto-generated on first install (same pattern as encryptionKey).
  # Set explicitly for disaster recovery or cluster migration.
  authSecret: ""
  # Secret used to sign MCP OAuth access tokens (HS256 JWT). Auto-generated on first
  # install. Set explicitly for disaster recovery or when rotating the signing key.
  mcpJwtSecret: ""
  # Optional: read the MCP JWT secret from a pre-existing Kubernetes Secret instead.
  # The secret must exist in the system namespace before helm install/upgrade.
  mcpJwtSecretRef:
    name: ""
    key: "mcp-jwt-secret"
  # Default Kubernetes resource allocations applied to every app deployment.
  # Uses standard Kubernetes quantity notation (100m, 256Mi, 1, etc.).
  defaultResources:
    cpuRequest: "100m"
    memoryRequest: "128Mi"
    cpuLimit: "500m"
    memoryLimit: "512Mi"
  # Public base URL used to construct webhook payload URLs registered with git providers.
  # Leave empty to use the UI hostname. Set this if your API is accessible at a different
  # hostname than the UI (e.g. when only the API is publicly exposed).
  webhookBaseUrl: ""
  # Disable email/password sign-up. Existing users can still sign in with email.
  # Set to true on closed-access deployments where user accounts are created by an admin.
  # Defaults to false (sign-up is open).
  disableEmailSignup: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# UI service (Next.js)
# ---------------------------------------------------------------------------
ui:
  # Override image (defaults to {image.repo}/canette-ui:{image.tag})
  image: ""
  # Required: public hostname for the UI, e.g. canette.example.com
  # Used for the HTTPRoute and as the CORS origin passed to the API.
  hostname: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Logstreamer service (live pod log streaming — no database)
# ---------------------------------------------------------------------------
logstreamer:
  # Override image (defaults to {image.repo}/canette-logstreamer:{image.tag})
  image: ""
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

# ---------------------------------------------------------------------------
# Database migrations
# ---------------------------------------------------------------------------
migrations:
  # By default, migrations run inline at API startup (RUN_MIGRATIONS=true).
  # Set enabled=true to run migrations as a Helm pre-upgrade Job instead.
  # When enabled, the API deployment will have RUN_MIGRATIONS=false injected
  # so migrations do not run twice.
  enabled: false
