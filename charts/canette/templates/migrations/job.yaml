{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: canette-migrations-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: canette-migrations
    {{- include "canette.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canette-migrations
    spec:
      restartPolicy: Never
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ include "canette.imagePullPolicy" .Values.postgres.image }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.{{ .Release.Namespace }}.svc.cluster.local -U canette; do
                echo "waiting for postgres..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: migrate
          {{- $image := include "canette.serviceImage" (list . "canette-api" .Values.api.image) }}
          image: {{ $image }}
          imagePullPolicy: {{ include "canette.imagePullPolicy" $image }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["./db-migrate"]
          env:
            {{- if and (not .Values.postgres.enabled) .Values.externalDatabase.passwordSecretRef.name }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.passwordSecretRef.name }}
                  key: {{ .Values.externalDatabase.passwordSecretRef.key }}
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
              {{- else }}
              value: {{ include "canette.databaseURL" . | quote }}
              {{- end }}
            {{- if and (not .Values.postgres.enabled) (or .Values.externalDatabase.ssl.caCert .Values.externalDatabase.ssl.caCertSecretRef.name) }}
            - name: DATABASE_CA_CERT_FILE
              value: /run/secrets/database-ca-cert
            {{- end }}
            {{- if and (not .Values.postgres.enabled) (not .Values.externalDatabase.ssl.rejectUnauthorized) }}
            - name: DATABASE_SSL_REJECT_UNAUTHORIZED
              value: "false"
            {{- end }}
          volumeMounts:
            {{- if and (not .Values.postgres.enabled) (or .Values.externalDatabase.ssl.caCert .Values.externalDatabase.ssl.caCertSecretRef.name) }}
            - name: database-ca-cert
              mountPath: /run/secrets/database-ca-cert
              subPath: ca.crt
              readOnly: true
            {{- end }}
      volumes:
        {{- if and (not .Values.postgres.enabled) (or .Values.externalDatabase.ssl.caCert .Values.externalDatabase.ssl.caCertSecretRef.name) }}
        - name: database-ca-cert
          secret:
            {{- if .Values.externalDatabase.ssl.caCertSecretRef.name }}
            secretName: {{ .Values.externalDatabase.ssl.caCertSecretRef.name }}
            items:
              - key: {{ .Values.externalDatabase.ssl.caCertSecretRef.key }}
                path: ca.crt
            {{- else }}
            secretName: canette-api-secrets
            items:
              - key: database-ca-cert
                path: ca.crt
            {{- end }}
        {{- end }}
{{- end }}
