{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: canette-migrations-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: canette-migrations
    {{- include "canette.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canette-migrations
    spec:
      restartPolicy: Never
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ include "canette.imagePullPolicy" .Values.postgres.image }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.{{ .Release.Namespace }}.svc.cluster.local -U canette; do
                echo "waiting for postgres..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: migrate
          {{- $image := include "canette.serviceImage" (list . "canette-api" .Values.api.image) }}
          image: {{ $image }}
          imagePullPolicy: {{ include "canette.imagePullPolicy" $image }}
          command: ["bun", "run", "db:migrate"]
          env:
            {{- if and (not .Values.postgres.enabled) .Values.externalDatabase.passwordSecretRef.name }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.passwordSecretRef.name }}
                  key: {{ .Values.externalDatabase.passwordSecretRef.key }}
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
              {{- else }}
              value: {{ include "canette.databaseURL" . | quote }}
              {{- end }}
{{- end }}
