apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canette-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: canette-ui
    {{- include "canette.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.controller.gateway.name }}
      namespace: {{ .Values.controller.gateway.namespace }}
  hostnames:
    - {{ required "ui.hostname is required" .Values.ui.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: canette-api
          port: 3001
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known
      backendRefs:
        - name: canette-api
          port: 3001
    - matches:
        - path:
            type: PathPrefix
            value: /oauth
      backendRefs:
        - name: canette-api
          port: 3001
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: canette-ui
          port: 3000
