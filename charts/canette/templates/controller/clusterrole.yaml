apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: canette-controller
  labels:
    {{- include "canette.labels" . | nindent 4 }}
rules:
  # Namespace management — required to create per-project namespaces at runtime
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "patch"]
  # App workload resources in dynamically created can-* namespaces
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Gateway API — HTTPRoute resources for app ingress
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["create", "get", "patch", "delete"]
