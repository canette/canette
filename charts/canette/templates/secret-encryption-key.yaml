{{/* Resolve the encryption key with upgrade-safe precedence:
     1. Explicit value in values.yaml (operator override)
     2. Existing Secret in the cluster (upgrade — reuse what's there)
     3. Generate a new random key (first install)
     NOTE: lookup always returns empty during `helm template`, so rendered output
     will show a freshly generated key — this is expected and harmless. */}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "canette-encryption-key" }}
{{- $key := "" }}
{{- if .Values.encryptionKey }}
  {{- $key = .Values.encryptionKey }}
{{- else if $existingSecret }}
  {{- $key = index $existingSecret.data "key" | b64dec }}
{{- else }}
  {{- $key = randAlphaNum 64 | sha256sum }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: canette-encryption-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: Opaque
stringData:
  key: {{ $key | quote }}
