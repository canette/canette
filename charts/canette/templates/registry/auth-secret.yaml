{{- if .Values.registry.enabled }}
{{/* Resolve registry credentials with upgrade-safe precedence:
     1. Existing canette-registry-credentials Secret in the cluster (upgrade — reuse)
     2. Explicit username/password in values.yaml (operator override)
     3. Generate new random credentials (first install)
     NOTE: lookup always returns empty during `helm template`, so rendered output
     will show freshly generated credentials — this is expected and harmless. */}}
{{- $existingCreds := lookup "v1" "Secret" .Release.Namespace "canette-registry-credentials" }}
{{- $username := "" }}
{{- $password := "" }}
{{- if $existingCreds }}
  {{- $username = index $existingCreds.data "username" | b64dec }}
  {{- $password = index $existingCreds.data "password" | b64dec }}
{{- else if and .Values.registry.username .Values.registry.password }}
  {{- $username = .Values.registry.username }}
  {{- $password = .Values.registry.password }}
{{- else }}
  {{- $username = "canette" }}
  {{- $password = randAlphaNum 32 }}
{{- end }}
{{- $host := include "canette.registryHost" . }}
{{- $auth := printf "%s:%s" $username $password | b64enc }}
{{- $dockerconfig := printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}" $host $auth }}
apiVersion: v1
kind: Secret
metadata:
  name: canette-registry-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $username | quote }}
  password: {{ $password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: canette-registry-htpasswd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: Opaque
stringData:
  htpasswd: {{ htpasswd $username $password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: canette-registry-auth
  namespace: {{ include "canette.buildNamespace" . }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ $dockerconfig | quote }}
{{- else if .Values.externalRegistry.username }}
{{- $extPassword := .Values.externalRegistry.password }}
{{- if .Values.externalRegistry.passwordSecretRef.name }}
  {{- $pwdSecret := lookup "v1" "Secret" .Release.Namespace .Values.externalRegistry.passwordSecretRef.name }}
  {{- if $pwdSecret }}
    {{- $extPassword = index $pwdSecret.data .Values.externalRegistry.passwordSecretRef.key | b64dec }}
  {{- end }}
{{- end }}
{{- $host := include "canette.registryHost" . }}
{{- $auth := printf "%s:%s" .Values.externalRegistry.username $extPassword | b64enc }}
{{- $dockerconfig := printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}" $host $auth }}
apiVersion: v1
kind: Secret
metadata:
  name: canette-registry-auth
  namespace: {{ include "canette.buildNamespace" . }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ $dockerconfig | quote }}
{{- end }}
