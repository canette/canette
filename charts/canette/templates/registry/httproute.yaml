{{- if .Values.registry.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canette-registry
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: registry
    {{- include "canette.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.controller.gateway.name }}
      namespace: {{ .Values.controller.gateway.namespace }}
  hostnames:
    - "registry.{{ required "domain is required" .Values.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: registry
          port: 5000
{{- end }}
