{{- if .Values.registry.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: registry
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: registry
    {{- include "canette.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
{{- end }}
