{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: registry
    {{- include "canette.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: registry
  ports:
    - port: 5000
      targetPort: 5000
{{- end }}
