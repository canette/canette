{{- if .Values.postgres.enabled }}
{{/* Resolve the postgres password with upgrade-safe precedence:
     1. Existing postgres-credentials Secret in the cluster (upgrade — reuse)
     2. Explicit password in values.yaml (operator override)
     3. Generate a new random password (first install)
     NOTE: lookup always returns empty during `helm template`, so rendered output
     will show a freshly generated password — this is expected and harmless. */}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "postgres-credentials" }}
{{- $password := "" }}
{{- if $existingSecret }}
  {{- $password = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{- else if .Values.postgres.password }}
  {{- $password = .Values.postgres.password }}
{{- else }}
  {{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: canette
  POSTGRES_PASSWORD: {{ $password | quote }}
  POSTGRES_DB: canette
  DATABASE_URL: {{ printf "postgresql://canette:%s@postgres.%s.svc.cluster.local:5432/canette?sslmode=disable" $password .Release.Namespace | quote }}
{{- end }}
