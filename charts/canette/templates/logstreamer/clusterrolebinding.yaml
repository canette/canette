apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: canette-logstreamer
  labels:
    {{- include "canette.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: canette-logstreamer
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: canette-logstreamer
  apiGroup: rbac.authorization.k8s.io
