{{/* Resolve the logstreamer shared secret with upgrade-safe precedence:
     1. Explicit value in values.yaml (operator override)
     2. Existing Secret in the cluster (upgrade — reuse what's there)
     3. Generate a new random secret (first install) */}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "canette-logstreamer-secret" }}
{{- $token := "" }}
{{- if .Values.logstreamer.secret }}
  {{- $token = .Values.logstreamer.secret }}
{{- else if $existingSecret }}
  {{- $token = index $existingSecret.data "token" | b64dec }}
{{- else }}
  {{- $token = randAlphaNum 64 | sha256sum }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: canette-logstreamer-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $token | quote }}
