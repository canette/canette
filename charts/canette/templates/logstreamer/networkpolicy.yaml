apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: canette-logstreamer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: canette-logstreamer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: canette-api
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # K8s API server — required to list pods and stream logs across app namespaces
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
