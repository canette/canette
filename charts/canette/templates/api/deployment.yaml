apiVersion: apps/v1
kind: Deployment
metadata:
  name: canette-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: canette-api
    {{- include "canette.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: canette-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canette-api
    spec:
      automountServiceAccountToken: false
      containers:
        - name: api
          {{- $image := include "canette.serviceImage" (list . "canette-api" .Values.api.image) }}
          image: {{ $image }}
          imagePullPolicy: {{ include "canette.imagePullPolicy" $image }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            {{- if and (not .Values.postgres.enabled) .Values.externalDatabase.passwordSecretRef.name }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.passwordSecretRef.name }}
                  key: {{ .Values.externalDatabase.passwordSecretRef.key }}
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
              {{- else }}
              value: {{ include "canette.databaseURL" . | quote }}
              {{- end }}
            - name: ENCRYPTION_KEY_FILE
              value: /run/secrets/encryption-key
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: canette-api-secrets
                  key: auth-secret
            {{- if .Values.api.githubClientId }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: canette-api-secrets
                  key: github-client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if ((.Values.api.githubClientSecretRef).name) }}
                  name: {{ .Values.api.githubClientSecretRef.name }}
                  key: {{ .Values.api.githubClientSecretRef.key }}
                  {{- else }}
                  name: canette-api-secrets
                  key: github-client-secret
                  {{- end }}
            {{- end }}
            {{- if .Values.api.googleClientId }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: canette-api-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if ((.Values.api.googleClientSecretRef).name) }}
                  name: {{ .Values.api.googleClientSecretRef.name }}
                  key: {{ .Values.api.googleClientSecretRef.key }}
                  {{- else }}
                  name: canette-api-secrets
                  key: google-client-secret
                  {{- end }}
            {{- end }}
            {{- if .Values.api.githubApp.appId }}
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: canette-api-secrets
                  key: github-app-id
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: canette-api-secrets
                  key: github-app-installation-id
            {{- if .Values.api.githubApp.publicLink }}
            - name: GITHUB_APP_PUBLIC_LINK
              valueFrom:
                secretKeyRef:
                  name: canette-api-secrets
                  key: github-app-public-link
            {{- end }}
            - name: GITHUB_APP_PRIVATE_KEY_FILE
              value: /run/secrets/github-app-private-key
            {{- end }}
            - name: UI_URL
              value: {{ include "canette.uiURL" . | quote }}
            - name: BETTER_AUTH_URL
              value: {{ include "canette.uiURL" . | quote }}
            - name: LOGSTREAMER_URL
              value: {{ include "canette.logstreamerURL" . | quote }}
            - name: LOGSTREAMER_SECRET
              valueFrom:
                secretKeyRef:
                  name: canette-logstreamer-secret
                  key: token
            - name: DEFAULT_CPU_REQUEST
              value: {{ .Values.api.defaultResources.cpuRequest | quote }}
            - name: DEFAULT_MEMORY_REQUEST
              value: {{ .Values.api.defaultResources.memoryRequest | quote }}
            - name: DEFAULT_CPU_LIMIT
              value: {{ .Values.api.defaultResources.cpuLimit | quote }}
            - name: DEFAULT_MEMORY_LIMIT
              value: {{ .Values.api.defaultResources.memoryLimit | quote }}
            - name: WEBHOOK_BASE_URL
              value: {{ .Values.api.webhookBaseUrl | quote }}
            - name: IMAGE_REPO
              value: {{ include "canette.imageRepo" . | quote }}
            - name: SCAN_PROVIDER
              value: {{ .Values.security.scan.provider | quote }}
            - name: SCAN_ENABLED
              value: {{ .Values.security.scan.enabled | quote }}
            - name: SCAN_MANDATORY
              value: {{ .Values.security.scan.mandatory | quote }}
            - name: SCAN_FAIL_SEVERITY
              value: {{ .Values.security.scan.failSeverity | quote }}
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: DISABLE_EMAIL_SIGNUP
              value: {{ if .Values.api.disableEmailSignup }}"true"{{ else }}"false"{{ end }}
            - name: EMAIL_PROVIDER
              value: {{ .Values.api.email.provider | quote }}
            - name: EMAIL_FROM
              value: {{ .Values.api.email.from | quote }}
            {{- if .Values.api.email.provider }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if ((.Values.api.email.resendApiKeyRef).name) }}
                  name: {{ .Values.api.email.resendApiKeyRef.name }}
                  key: {{ .Values.api.email.resendApiKeyRef.key }}
                  {{- else }}
                  name: canette-api-secrets
                  key: resend-api-key
                  {{- end }}
            {{- end }}
            - name: MCP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if ((.Values.api.mcpJwtSecretRef).name) }}
                  name: {{ .Values.api.mcpJwtSecretRef.name }}
                  key: {{ .Values.api.mcpJwtSecretRef.key }}
                  {{- else }}
                  name: canette-api-secrets
                  key: mcp-jwt-secret
                  {{- end }}
            {{- if and (not .Values.postgres.enabled) (or .Values.externalDatabase.ssl.caCert .Values.externalDatabase.ssl.caCertSecretRef.name) }}
            - name: DATABASE_CA_CERT_FILE
              value: /run/secrets/database-ca-cert
            {{- end }}
            {{- if and (not .Values.postgres.enabled) (not .Values.externalDatabase.ssl.rejectUnauthorized) }}
            - name: DATABASE_SSL_REJECT_UNAUTHORIZED
              value: "false"
            {{- end }}
            {{- if .Values.migrations.enabled }}
            - name: RUN_MIGRATIONS
              value: "false"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: encryption-key
              mountPath: /run/secrets/encryption-key
              subPath: key
              readOnly: true
            {{- if .Values.api.githubApp.appId }}
            - name: github-app-private-key
              mountPath: /run/secrets/github-app-private-key
              subPath: key
              readOnly: true
            {{- end }}
            {{- if and (not .Values.postgres.enabled) (or .Values.externalDatabase.ssl.caCert .Values.externalDatabase.ssl.caCertSecretRef.name) }}
            - name: database-ca-cert
              mountPath: /run/secrets/database-ca-cert
              subPath: ca.crt
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: encryption-key
          secret:
            secretName: canette-encryption-key
            items:
              - key: key
                path: key
        {{- if .Values.api.githubApp.appId }}
        - name: github-app-private-key
          secret:
            {{- if ((.Values.api.githubApp.privateKeySecretRef).name) }}
            secretName: {{ .Values.api.githubApp.privateKeySecretRef.name }}
            items:
              - key: {{ .Values.api.githubApp.privateKeySecretRef.key }}
                path: key
            {{- else }}
            secretName: canette-api-secrets
            items:
              - key: github-app-private-key
                path: key
            {{- end }}
        {{- end }}
        {{- if and (not .Values.postgres.enabled) (or .Values.externalDatabase.ssl.caCert .Values.externalDatabase.ssl.caCertSecretRef.name) }}
        - name: database-ca-cert
          secret:
            {{- if .Values.externalDatabase.ssl.caCertSecretRef.name }}
            secretName: {{ .Values.externalDatabase.ssl.caCertSecretRef.name }}
            items:
              - key: {{ .Values.externalDatabase.ssl.caCertSecretRef.key }}
                path: ca.crt
            {{- else }}
            secretName: canette-api-secrets
            items:
              - key: database-ca-cert
                path: ca.crt
            {{- end }}
        {{- end }}
