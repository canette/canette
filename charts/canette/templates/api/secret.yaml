{{/* Resolve BETTER_AUTH_SECRET with upgrade-safe precedence:
     1. Explicit value in values.yaml
     2. Existing Secret in the cluster (upgrade — reuse what's there)
     3. Generate a new random secret (first install) */}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "canette-api-secrets" }}
{{- $authSecret := "" }}
{{- if .Values.api.authSecret }}
  {{- $authSecret = .Values.api.authSecret }}
{{- else if $existingSecret }}
  {{- $authSecret = index $existingSecret.data "auth-secret" | b64dec }}
{{- else }}
  {{- $authSecret = randAlphaNum 64 | sha256sum }}
{{- end }}
{{/* Resolve MCP_JWT_SECRET with the same upgrade-safe precedence */}}
{{- $mcpJwtSecret := "" }}
{{- if .Values.api.mcpJwtSecret }}
  {{- $mcpJwtSecret = .Values.api.mcpJwtSecret }}
{{- else if $existingSecret }}
  {{- $existingMcpJwt := index $existingSecret.data "mcp-jwt-secret" }}
  {{- if $existingMcpJwt }}
    {{- $mcpJwtSecret = $existingMcpJwt | b64dec }}
  {{- else }}
    {{- $mcpJwtSecret = randAlphaNum 64 | sha256sum }}
  {{- end }}
{{- else }}
  {{- $mcpJwtSecret = randAlphaNum 64 | sha256sum }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: canette-api-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
type: Opaque
stringData:
  auth-secret: {{ $authSecret | quote }}
  mcp-jwt-secret: {{ $mcpJwtSecret | quote }}
  {{- if .Values.api.githubClientId }}
  github-client-id: {{ .Values.api.githubClientId | quote }}
  github-client-secret: {{ .Values.api.githubClientSecret | quote }}
  {{- end }}
  {{- if .Values.api.googleClientId }}
  google-client-id: {{ .Values.api.googleClientId | quote }}
  google-client-secret: {{ .Values.api.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.externalDatabase.ssl.caCert }}
  database-ca-cert: {{ .Values.externalDatabase.ssl.caCert | quote }}
  {{- end }}
  {{- if .Values.api.githubApp.appId }}
  github-app-id: {{ .Values.api.githubApp.appId | quote }}
  github-app-installation-id: {{ .Values.api.githubApp.installationId | quote }}
  {{- if .Values.api.githubApp.publicLink }}
  github-app-public-link: {{ .Values.api.githubApp.publicLink | quote }}
  {{- end }}
  {{- if not ((.Values.api.githubApp.privateKeySecretRef).name) }}
  github-app-private-key: {{ .Values.api.githubApp.privateKey | quote }}
  {{- end }}
  {{- end }}
