apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canette-builder
  namespace: {{ include "canette.buildNamespace" . }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
