apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canette-builder
  namespace: {{ include "canette.buildNamespace" . }}
  labels:
    {{- include "canette.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: canette-builder
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: canette-builder
  apiGroup: rbac.authorization.k8s.io
